<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Courier+Prime:ital@0;1&display=swap');

  :root {
    --bg: #050810;
    --surface: #0a0f1e;
    --border: #1a2540;
    --dim: #1e2d4a;
    --text: #7fa8d4;
    --text-bright: #c8dff5;
    --accent: #3d8bcd;
    --signal: #4fc3f7;
    --anomaly: #ff6b6b;
    --anomaly-dim: rgba(255,107,107,0.15);
    --safe: #26a69a;
    --mono: 'Share Tech Mono', monospace;
    --serif: 'Courier Prime', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  .status-badge {
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  /* Key input */
  .key-section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .key-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 10px;
    display: block;
  }

  .key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #keyInput {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 12px;
    letter-spacing: 0.2em;
    width: 140px;
    outline: none;
    transition: border-color 0.2s;
  }

  #keyInput:focus { border-color: var(--accent); }
  #keyInput.valid { border-color: var(--safe); color: var(--safe); }
  #keyInput.invalid { border-color: var(--anomaly); }

  .key-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .key-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .key-status {
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-left: 8px;
  }

  /* Chart */
  .chart-section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  #sigmaChart {
    width: 100%;
    height: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: block;
  }

  /* Table */
  .table-section { margin-bottom: 28px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    text-align: left;
    padding: 8px 10px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    font-weight: normal;
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid rgba(26,37,64,0.5);
    vertical-align: middle;
  }

  tr.anomaly-row {
    background: var(--anomaly-dim);
  }

  tr.anomaly-row td { color: var(--text-bright); }

  .sigma-val { font-size: 12px; }
  .sigma-high { color: var(--anomaly); font-weight: bold; }
  .sigma-mid { color: var(--signal); }
  .sigma-low { color: var(--dim); }

  .word-cell {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--anomaly);
  }

  .word-locked {
    color: var(--dim);
    font-size: 10px;
    font-style: italic;
  }

  .lotto-nums {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .lotto-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border: 1px solid var(--dim);
    font-size: 10px;
    color: var(--text);
  }

  .lotto-locked {
    color: var(--dim);
    font-size: 10px;
  }

  .sources-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 2px;
    background: var(--safe);
    vertical-align: middle;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Loading */
  #loading {
    text-align: center;
    padding: 60px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Glow on anomaly rows */
  @keyframes glow {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 12px rgba(255,107,107,0.2); }
  }

  tr.anomaly-row { animation: glow 3s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div>
        <h1>Temporal Signal Receiver</h1>
        <div class="subtitle">passive monitoring · causal branch unknown</div>
      </div>
      <div class="status-badge" id="statusBadge">INITIALIZING</div>
    </div>
  </header>

  <div class="key-section">
    <span class="key-label">DECRYPTION KEY</span>
    <div class="key-row">
      <input type="text" id="keyInput" placeholder="______" maxlength="12" autocomplete="off" />
      <button class="key-btn" onclick="applyKey()">APPLY</button>
      <span class="key-status" id="keyStatus"></span>
    </div>
  </div>

  <div id="loading">LOADING SIGNAL DATA ···</div>
  <div id="mainContent" style="display:none">

    <div class="chart-section">
      <div class="section-label">SIGMA DEVIATION · 30 DAYS</div>
      <canvas id="sigmaChart"></canvas>
    </div>

    <div class="table-section">
      <div class="section-label">SIGNAL LOG</div>
      <table>
        <thead>
          <tr>
            <th>DATE</th>
            <th>σ DEVIATION</th>
            <th>WORD SIGNAL</th>
            <th>LOTTO / NUM7</th>
            <th>SRC</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>

  <footer>
    <span id="footerLeft">—</span>
    <span>KEY: <span id="footerKey" style="color:var(--dim)">NOT SET</span></span>
  </footer>

</div>

<script>
const CORRECT_KEY = "176248";
let keyUnlocked = false;
let allData = [];

async function loadData() {
  try {
    const res = await fetch('data/results.json?t=' + Date.now());
    allData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    render();
    document.getElementById('statusBadge').textContent = 'ACTIVE';
  } catch(e) {
    document.getElementById('loading').textContent = 'ERROR: COULD NOT LOAD DATA';
  }
}

function applyKey() {
  const val = document.getElementById('keyInput').value.trim();
  const inp = document.getElementById('keyInput');
  const status = document.getElementById('keyStatus');
  if (val === CORRECT_KEY) {
    keyUnlocked = true;
    inp.classList.add('valid');
    inp.classList.remove('invalid');
    status.style.color = 'var(--safe)';
    status.textContent = '✓ AUTHENTICATED';
    document.getElementById('footerKey').textContent = val;
    document.getElementById('footerKey').style.color = 'var(--safe)';
    render();
  } else {
    keyUnlocked = false;
    inp.classList.add('invalid');
    inp.classList.remove('valid');
    status.style.color = 'var(--anomaly)';
    status.textContent = '✗ REJECTED';
    render();
  }
}

document.getElementById('keyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyKey();
});

function render() {
  if (!allData.length) return;
  renderChart();
  renderTable();
  const last = allData[allData.length - 1];
  document.getElementById('footerLeft').textContent =
    `LAST SYNC: ${last.date} · ENTRIES: ${allData.length}`;
}

function renderChart() {
  const canvas = document.getElementById('sigmaChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  const recent = allData.slice(-30);
  const sigmas = recent.map(d => d.sigma || 0);
  const maxSigma = Math.max(...sigmas, 3) * 1.2;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(26,37,64,0.8)';
  ctx.lineWidth = 1;
  [1, 2, 3].forEach(level => {
    const y = H - (level / maxSigma) * (H - 20) - 10;
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.stroke();
    ctx.fillStyle = 'rgba(61,139,205,0.4)';
    ctx.font = '9px Share Tech Mono';
    ctx.fillText(`${level}σ`, 4, y - 3);
  });
  ctx.setLineDash([]);

  if (recent.length < 2) return;
  const stepX = W / (recent.length - 1);

  // Fill area
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(63,140,180,0.25)');
  grad.addColorStop(1, 'rgba(63,140,180,0)');
  ctx.beginPath();
  recent.forEach((d, i) => {
    const x = i * stepX;
    const y = H - (d.sigma / maxSigma) * (H - 20) - 10;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo((recent.length - 1) * stepX, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'var(--signal)';
  ctx.lineWidth = 1.5;
  recent.forEach((d, i) => {
    const x = i * stepX;
    const y = H - (d.sigma / maxSigma) * (H - 20) - 10;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Anomaly dots
  recent.forEach((d, i) => {
    if (!d.anomaly) return;
    const x = i * stepX;
    const y = H - (d.sigma / maxSigma) * (H - 20) - 10;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'var(--anomaly)';
    ctx.fill();
  });
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const recent = [...allData].reverse().slice(0, 60);

  tbody.innerHTML = recent.map(d => {
    const isAnomaly = d.anomaly;
    const sigmaClass = d.sigma >= 2 ? 'sigma-high' : d.sigma >= 1.5 ? 'sigma-mid' : 'sigma-low';

    const wordCell = isAnomaly
      ? (keyUnlocked
          ? `<span class="word-cell">${d.word || '—'}</span>`
          : `<span class="word-locked">[KEY REQUIRED]</span>`)
      : `<span class="sigma-low">—</span>`;

    const lottoCell = keyUnlocked && d.lotto && d.lotto.length
      ? `<div class="lotto-nums">${d.lotto.map(n => `<span class="lotto-num">${String(n).padStart(2,'0')}</span>`).join('')}</div>`
      : `<span class="lotto-locked">[KEY REQUIRED]</span>`;

    const srcDots = Array(d.sources || 0).fill('<span class="sources-dot"></span>').join('');

    return `<tr class="${isAnomaly ? 'anomaly-row' : ''}">
      <td>${d.date}</td>
      <td><span class="sigma-val ${sigmaClass}">${d.sigma.toFixed(3)}</span></td>
      <td>${wordCell}</td>
      <td>${lottoCell}</td>
      <td>${srcDots}</td>
    </tr>`;
  }).join('');
}

window.addEventListener('resize', () => { if (allData.length) renderChart(); });
loadData();
</script>
</body>
</html>
